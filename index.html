<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> login new </title>
</head>
<body>
    <!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --green: #00ff9d;
      --teal: #00c9b1;
      --dark-green: #00ff9d22;
      --glow: rgba(0,255,157,0.35);
      --glow-soft: rgba(0,255,157,0.12);
      --card: rgba(4,12,8,0.78);
      --border: rgba(0,255,157,0.2);
      --muted: rgba(255,255,255,0.35);
      --input-bg: rgba(0,255,157,0.04);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      background: url('https://images.unsplash.com/photo-1506318137071-a8e063b4bec0?w=1600&q=80') center/cover no-repeat fixed;
      font-family: 'DM Sans', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      position: relative;
      padding: 20px;
    }

    .bg-overlay {
      position: fixed;
      inset: 0;
      background: rgba(2,8,5,0.75);
      z-index: 0;
      pointer-events: none;
    }

    /* matrix rain effect dots */
    .matrix-dot {
      position: fixed;
      font-family: 'Share Tech Mono', monospace;
      font-size: 12px;
      color: rgba(0,255,157,0.15);
      pointer-events: none;
      z-index: 0;
      animation: fall linear infinite;
    }

    @keyframes fall {
      from { transform: translateY(-20px); opacity: 0.15; }
      to   { transform: translateY(100vh); opacity: 0; }
    }

    .orb {
      position: fixed;
      border-radius: 50%;
      filter: blur(90px);
      pointer-events: none;
      z-index: 0;
      animation: drift 8s ease-in-out infinite alternate;
    }

    .orb1 {
      width: 350px; height: 350px;
      background: rgba(0,255,157,0.12);
      top: -80px; right: -80px;
    }

    .orb2 {
      width: 280px; height: 280px;
      background: rgba(0,201,177,0.1);
      bottom: -60px; left: -60px;
      animation-delay: 3s;
    }

    @keyframes drift {
      from { transform: translateY(0) scale(1); }
      to   { transform: translateY(25px) scale(1.08); }
    }

    .grid-overlay {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(0,255,157,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,255,157,0.03) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      display: grid;
      grid-template-columns: 1fr 1fr;
      max-width: 860px;
      width: 100%;
      min-height: 500px;
      border-radius: 24px;
      overflow: hidden;
      box-shadow:
        0 40px 100px rgba(0,0,0,0.85),
        0 0 0 1px var(--border),
        0 0 60px rgba(0,255,157,0.06);
      animation: popIn 0.7s cubic-bezier(.22,.68,0,1.2) both;
    }

    @keyframes popIn {
      from { opacity: 0; transform: scale(0.93) translateY(24px); }
      to   { opacity: 1; transform: scale(1) translateY(0); }
    }

    /* left panel */
    .left {
      background: linear-gradient(145deg, rgba(0,255,157,0.1) 0%, rgba(0,201,177,0.04) 100%);
      border-right: 1px solid var(--border);
      padding: 48px 38px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(10px);
    }

    .left::before {
      content: '';
      position: absolute;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(0,255,157,0.12), transparent 70%);
      bottom: -50px; right: -50px;
      border-radius: 50%;
    }

    /* twinkling stars */
    .star {
      position: absolute;
      border-radius: 50%;
      background: var(--green);
      opacity: 0;
      animation: twinkle 3s ease-in-out infinite;
    }
    .star:nth-child(1) { width: 2px; height: 2px; top: 20%; left: 15%; animation-delay: 0s; }
    .star:nth-child(2) { width: 3px; height: 3px; top: 35%; left: 75%; animation-delay: 1s; }
    .star:nth-child(3) { width: 2px; height: 2px; top: 60%; left: 25%; animation-delay: 2s; }
    .star:nth-child(4) { width: 2px; height: 2px; top: 75%; left: 60%; animation-delay: 0.5s; }
    .star:nth-child(5) { width: 3px; height: 3px; top: 15%; left: 55%; animation-delay: 1.5s; }

    @keyframes twinkle {
      0%, 100% { opacity: 0; transform: scale(0.8); }
      50%       { opacity: 0.8; transform: scale(1.3); box-shadow: 0 0 6px var(--green); }
    }

    .brand { display: flex; flex-direction: column; gap: 14px; }

    .brand-icon {
      width: 54px; height: 54px;
      background: linear-gradient(135deg, var(--green), var(--teal));
      border-radius: 16px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 26px;
      box-shadow: 0 8px 28px var(--glow);
      animation: iconPulse 3s ease-in-out infinite;
    }

    @keyframes iconPulse {
      0%, 100% { box-shadow: 0 8px 28px var(--glow); }
      50%       { box-shadow: 0 8px 45px rgba(0,255,157,0.6); }
    }

    .brand-name {
      font-family: 'Syne', sans-serif;
      font-size: 26px;
      font-weight: 800;
      color: #fff;
      line-height: 1.1;
    }

    .brand-name span { color: var(--green); }

    .brand-sub {
      font-size: 12.5px;
      color: var(--muted);
      line-height: 1.7;
      max-width: 190px;
    }

    .code-deco {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10.5px;
      color: rgba(0,255,157,0.3);
      line-height: 2.2;
    }

    .code-deco .highlight { color: rgba(0,255,157,0.6); }

    /* right panel */
    .right {
      background: var(--card);
      backdrop-filter: blur(24px);
      -webkit-backdrop-filter: blur(24px);
      padding: 48px 40px;
      display: flex;
      flex-direction: column;
      justify-content: center;
    }

    .form-title {
      font-family: 'Syne', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: #fff;
      margin-bottom: 6px;
    }

    .form-sub {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--green);
      margin-bottom: 28px;
      opacity: 0.7;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 16px;
    }

    label {
      font-family: 'Share Tech Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--muted);
    }

    .input-wrap { position: relative; }

    .input-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      color: var(--muted);
      font-size: 14px;
      transition: color 0.25s;
      pointer-events: none;
    }

    input {
      width: 100%;
      background: var(--input-bg);
      border: 1px solid rgba(0,255,157,0.12);
      border-radius: 10px;
      color: #fff;
      font-family: 'Share Tech Mono', monospace;
      font-size: 13px;
      padding: 12px 14px 12px 40px;
      outline: none;
      transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
    }

    input::placeholder { color: rgba(255,255,255,0.18); }

    input:focus {
      border-color: var(--green);
      background: rgba(0,255,157,0.05);
      box-shadow: 0 0 0 3px rgba(0,255,157,0.12), 0 0 20px rgba(0,255,157,0.08);
    }

    .input-wrap:focus-within .input-icon { color: var(--green); }

    .forgot {
      text-align: right;
      margin-top: -8px;
      margin-bottom: 22px;
    }

    .forgot a {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--green);
      text-decoration: none;
      opacity: 0.7;
      transition: opacity 0.2s;
    }

    .forgot a:hover { opacity: 1; }

    .btn {
      width: 100%;
      padding: 13px;
      background: linear-gradient(90deg, var(--green), var(--teal));
      border: none;
      border-radius: 10px;
      color: #020c06;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 800;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: transform 0.18s, box-shadow 0.18s;
      box-shadow: 0 6px 24px var(--glow);
      margin-bottom: 20px;
      letter-spacing: 0.5px;
    }

    .btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.25), transparent);
      transform: translateX(-100%);
      transition: transform 0.5s;
    }

    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 32px rgba(0,255,157,0.5);
    }

    .btn:hover::before { transform: translateX(100%); }
    .btn:active { transform: translateY(0); }

    .divider {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 20px;
    }

    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(0,255,157,0.1);
    }

    .divider span {
      font-family: 'Share Tech Mono', monospace;
      font-size: 11px;
      color: var(--muted);
    }

    .signup {
      text-align: center;
      font-family: 'Share Tech Mono', monospace;
      font-size: 11.5px;
      color: var(--muted);
    }

    .signup a {
      color: var(--green);
      text-decoration: none;
      font-weight: 500;
    }

    .glow-line {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--green), transparent);
      animation: glowSweep 3s ease-in-out infinite;
    }

    @keyframes glowSweep {
      0%, 100% { opacity: 0.3; }
      50%       { opacity: 1; }
    }

    @media (max-width: 600px) {
      .container { grid-template-columns: 1fr; }
      .left { display: none; }
    }
  </style>
</head>
<body>
  <div class="bg-overlay"></div>
  <div class="orb orb1"></div>
  <div class="orb orb2"></div>
  <div class="grid-overlay"></div>

  <!-- matrix falling characters -->
  <div class="matrix-dot" style="left:5%;animation-duration:6s;animation-delay:0s">01</div>
  <div class="matrix-dot" style="left:15%;animation-duration:8s;animation-delay:1s">10</div>
  <div class="matrix-dot" style="left:25%;animation-duration:5s;animation-delay:2s">&lt;/&gt;</div>
  <div class="matrix-dot" style="left:75%;animation-duration:7s;animation-delay:0.5s">{};</div>
  <div class="matrix-dot" style="left:85%;animation-duration:9s;animation-delay:1.5s">01</div>
  <div class="matrix-dot" style="left:92%;animation-duration:6s;animation-delay:3s">10</div>

  <div class="container">
    <div class="left">
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>
      <div class="star"></div>

      <div class="brand">
        <div class="brand-icon">🚀</div>
        <h1 class="brand-name">Story<span>mint</span><br/>Studio</h1>
        <p class="brand-sub">Build beautiful things. Learn in public. Grow every day.</p>
      </div>

      <div class="code-deco">
        <div><span class="highlight">const</span> dream = "build";</div>
        <div><span class="highlight">const</span> action = "code";</div>
        <div><span class="highlight">const</span> result = dream</div>
        <div>&nbsp;&nbsp;+ action + <span class="highlight">"🔥"</span>;</div>
      </div>

      <div class="glow-line"></div>
    </div>

    <div class="right">
      <h2 class="form-title">Welcome back 👋</h2>
      <p class="form-sub">// login to continue your journey</p>

      <div class="field">
        <label>Email</label>
        <div class="input-wrap">
          <input type="email" placeholder="you@example.com"/>
          <span class="input-icon">✉</span>
        </div>
      </div>

      <div class="field">
        <label>Password</label>
        <div class="input-wrap">
          <input type="password" placeholder="Min. 8 characters"/>
          <span class="input-icon">🔒</span>
        </div>
      </div>

      <div class="forgot"><a href="#">Forgot password?</a></div>
      <button class="btn">Login →</button>
      <div class="divider"><span>or</span></div>
      <p class="signup"> Don't have an account ?  <a href="#"> Sign up </a></p>
    </div>
  </div>
</body>
</html>
</body>
</html>
